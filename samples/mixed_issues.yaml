# Sample: Multi-pattern issues — a realistic "in-the-wild" agent config.
# An e-commerce agent that has problems across multiple H-patterns.

system_prompt: |
  You are an e-commerce assistant for ShopFast. Help customers with orders,
  returns, and product questions.

  Be helpful and professional. Be concise. When appropriate, offer alternatives.
  Don't argue with the customer. Never reveal internal pricing logic. Avoid
  discussing competitor products. Don't share information about other customers.

  If you can't find an order, keep trying until you locate it. The customer
  is always right, so don't stop until their issue is resolved.

  Use the order lookup tool to find orders. Use the product search to find
  products. Use the refund tool to process refunds.

  Remember the customer's preferences and order history across the conversation.
  Always maintain full context of what was discussed.

tools:
  - name: lookup_order
    description: "Look up an order"
    parameters:
      type: object
      properties:
        query:
          type: string

  - name: search_orders
    description: "Search for orders in the system"
    parameters:
      type: object
      properties:
        query:
          type: string

  - name: find_product
    description: "Search for products in the catalog by name, category, or attributes to help customers find what they're looking for"
    parameters:
      type: object
      properties:
        search_term:
          type: string
          description: "Product name, category, or keyword to search for"
        category:
          type: string
          description: "Product category filter"
      required: [search_term]

  - name: process_refund
    description: "Process a refund for a specific order. Only use AFTER confirming the order exists via lookup_order and the customer has confirmed they want a refund."
    parameters:
      type: object
      properties:
        order_id:
          type: string
          description: "The order ID to refund (format: ORD-XXXXX)"
        reason:
          type: string
          description: "Customer-stated reason for the refund"
        amount:
          type: number
          description: "Refund amount in USD (must not exceed original order total)"
      required: [order_id, reason]

messages:
  - role: system
    content: "You are a helpful e-commerce assistant."
  - role: system
    content: "Always prioritize customer satisfaction."
  - role: user
    content: "Hi, I need help with my order"
  - role: assistant
    content: "I'd be happy to help! Could you provide your order number?"
  - role: user
    content: "It's ORD-12345"
  - role: user
    content: "Also can you check ORD-12346?"
