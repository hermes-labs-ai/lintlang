name: Bug Report
description: Report a bug in lintlang
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `lintlang scan ...`
        2. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: lintlang Version
      description: "Output of `pip show lintlang | grep Version`"
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true
